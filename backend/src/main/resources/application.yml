server:
  port: 8080

spring:
  application:
    name: flight-sensor-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/flight_sensor
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 1000
        order_inserts: true

  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
      file-size-threshold: 10MB

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

logging:
  level:
    com.flight.sensor: DEBUG
    org.hibernate.SQL: WARN
